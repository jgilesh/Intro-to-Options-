<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Introduction to Options Trading — demystified</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#F5F0E8; font-family:system-ui,-apple-system,sans-serif; color:#1a1108; min-height:100vh; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.fu { animation:fadeUp 0.3s ease forwards; }
.si { animation:slideIn 0.25s ease forwards; }
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#C4A460;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const OR="#F5853F", RD="#D94F2A", GR="#0D9E6E", GD="#C4A460";
const PU="#7C5CBF", BL="#2A7ED4", DK="#1a1108";
const CA="#fffcf7", BD="#e8ddd0";

// ── Shared components — all defined outside App ───────────────

function NextBtn({ label, onClick }) {
  return (
    <button onClick={onClick} style={{background:OR,border:"none",borderRadius:"999px",
      padding:"10px 26px",color:"#fff",fontWeight:"700",fontSize:"0.82rem",
      letterSpacing:"0.06em",cursor:"pointer",display:"flex",alignItems:"center",
      gap:"6px",margin:"24px auto 0"}}>
      {label} →
    </button>
  );
}

function DarkCallout({ eyebrow, children }) {
  return (
    <div style={{background:"linear-gradient(130deg,#1a1108,#2c1d0e)",borderRadius:"12px",
      padding:"16px 20px",marginBottom:"16px"}}>
      <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.15em",
        textTransform:"uppercase",color:"#9a7a55",marginBottom:"8px"}}>{eyebrow}</div>
      <div style={{fontSize:"0.88rem",color:"#e8ddd0",lineHeight:"1.7"}}>{children}</div>
    </div>
  );
}

function RuleBox({ rule }) {
  return (
    <div style={{background:"linear-gradient(130deg,#1a1108,#2c1d0e)",borderRadius:"8px",
      padding:"11px 13px",marginBottom:"10px"}}>
      <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.12em",
        textTransform:"uppercase",color:"#9a7a55",marginBottom:"6px"}}>⚡ The Rule</div>
      <div style={{fontSize:"0.78rem",lineHeight:"1.65",color:"#e8ddd0"}}>{rule}</div>
    </div>
  );
}

function SectionLabel({ label, sub }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px",
      paddingBottom:"8px",borderBottom:"2px solid #e8ddd033"}}>
      <div style={{width:"3px",height:"22px",background:OR,borderRadius:"2px"}}/>
      <div>
        <div style={{fontWeight:"700",fontSize:"0.88rem",color:DK}}>{label}</div>
        {sub && <div style={{fontSize:"0.72rem",color:"#8a7560"}}>{sub}</div>}
      </div>
    </div>
  );
}

// ── Tab 1: What Is an Option ──────────────────────────────────

function Tab1({ onNext }) {
  return (
    <div className="fu">
      <DarkCallout eyebrow="Introduction">
        An option is a contract that gives you the right — but not the obligation — to buy or sell a stock at a specific price before a specific date. That one sentence is the foundation.
      </DarkCallout>

      {/* Three key elements — step strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"22px"}}>
        {[
          {n:"1",color:OR,title:"A Right, Not a Duty",   desc:"You can act on the contract — or let it expire. You are never forced to do anything."},
          {n:"2",color:BL,title:"A Specific Price",       desc:"The strike price is locked in when you enter. The stock can move wherever it wants."},
          {n:"3",color:PU,title:"A Specific Date",        desc:"Every contract has an expiration date. After that date, the contract is gone."},
        ].map(s=>(
          <div key={s.n} style={{background:CA,border:"1px solid "+BD,borderRadius:"10px",
            padding:"14px",borderTop:"3px solid "+s.color}}>
            <div style={{width:"24px",height:"24px",borderRadius:"50%",background:s.color,
              color:"#fff",fontWeight:"700",fontSize:"0.78rem",display:"flex",
              alignItems:"center",justifyContent:"center",marginBottom:"8px"}}>{s.n}</div>
            <div style={{fontWeight:"700",fontSize:"0.82rem",color:DK,marginBottom:"4px"}}>{s.title}</div>
            <div style={{fontSize:"0.72rem",color:"#5a4535",lineHeight:"1.5"}}>{s.desc}</div>
          </div>
        ))}
      </div>

      <SectionLabel label="The Two Types of Options" />

      {/* Call card */}
      <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",overflow:"hidden",
        borderLeft:"4px solid "+GR,marginBottom:"10px"}}>
        <div style={{padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
            <span style={{fontSize:"1.4rem"}}>📈</span>
            <div>
              <div style={{fontWeight:"700",fontSize:"0.95rem",color:DK}}>Call Option</div>
              <div style={{fontSize:"0.75rem",color:"#8a7560"}}>The right to buy 100 shares at the strike price</div>
            </div>
            <span style={{marginLeft:"auto",display:"inline-block",padding:"3px 10px",
              borderRadius:"999px",background:"#e8faf3",color:GR,
              fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.08em"}}>BULLISH</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <div style={{background:"#f7f0e6",borderRadius:"8px",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:"#8a7560",marginBottom:"5px"}}>When you'd buy a call</div>
              <div style={{fontSize:"0.82rem",color:"#3d2e1e",lineHeight:"1.6"}}>
                You believe the stock will <strong>rise</strong> before the expiration date. If the stock climbs above your strike price, your contract gains value.
              </div>
            </div>
            <div style={{background:"#e8faf3",borderRadius:"8px",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:"#065f46",marginBottom:"5px"}}>Example</div>
              <div style={{fontSize:"0.82rem",color:"#052e16",lineHeight:"1.6"}}>
                Stock at $50. You buy a call with a $52 strike. If the stock rises to $56, your contract gains value. If it stays at $50, it expires worthless.
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Put card */}
      <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",overflow:"hidden",
        borderLeft:"4px solid "+RD,marginBottom:"20px"}}>
        <div style={{padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
            <span style={{fontSize:"1.4rem"}}>📉</span>
            <div>
              <div style={{fontWeight:"700",fontSize:"0.95rem",color:DK}}>Put Option</div>
              <div style={{fontSize:"0.75rem",color:"#8a7560"}}>The right to sell 100 shares at the strike price</div>
            </div>
            <span style={{marginLeft:"auto",display:"inline-block",padding:"3px 10px",
              borderRadius:"999px",background:"#fff0ee",color:RD,
              fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.08em"}}>BEARISH</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <div style={{background:"#f7f0e6",borderRadius:"8px",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:"#8a7560",marginBottom:"5px"}}>When you'd buy a put</div>
              <div style={{fontSize:"0.82rem",color:"#3d2e1e",lineHeight:"1.6"}}>
                You believe the stock will <strong>fall</strong> before the expiration date. If the stock drops below your strike price, your contract gains value.
              </div>
            </div>
            <div style={{background:"#fff0ee",borderRadius:"8px",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:RD,marginBottom:"5px"}}>Example</div>
              <div style={{fontSize:"0.82rem",color:"#5a1a1a",lineHeight:"1.6"}}>
                Stock at $50. You buy a put with a $48 strike. If the stock falls to $44, your contract gains value. If it stays at $50, it expires worthless.
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Summary table */}
      <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",overflow:"hidden",marginBottom:"8px"}}>
        <div style={{background:"#f0e8da",padding:"12px 16px",borderBottom:"1px solid "+BD}}>
          <div style={{fontWeight:"700",fontSize:"0.82rem",color:DK}}>📋 Calls vs. Puts — Quick Reference</div>
          <div style={{fontSize:"0.72rem",color:"#8a7560",marginTop:"2px"}}>Same rules, opposite directions</div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:"360px"}}>
            <thead>
              <tr style={{background:"#f5ede0"}}>
                {["","Call Option","Put Option"].map(h=>(
                  <th key={h} style={{padding:"9px 14px",textAlign:"left",fontWeight:"700",
                    fontSize:"0.7rem",letterSpacing:"0.08em",textTransform:"uppercase",
                    color:DK,borderBottom:"1px solid "+BD}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                ["Right to",           "Buy 100 shares",              "Sell 100 shares"],
                ["You profit when",    "Stock goes up",               "Stock goes down"],
                ["Expires worthless if","Stock stays flat or drops",  "Stock stays flat or rises"],
                ["Max loss",           "Premium paid",                "Premium paid"],
              ].map((row,i)=>(
                <tr key={i} style={{background:i%2===0?CA:"#f9f3eb"}}>
                  {row.map((cell,j)=>(
                    <td key={j} style={{padding:"9px 14px",borderBottom:"1px solid "+BD,
                      fontWeight:j===0?"700":"400",
                      color:j===1?GR:j===2?RD:DK,
                      fontSize:j===0?"0.75rem":"0.82rem"}}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <NextBtn label="Next: Contracts & Cost" onClick={onNext} />
    </div>
  );
}

// ── Tab 2: Contracts & Cost ───────────────────────────────────

function Tab2() {
  return (
    <div className="fu">
      <SectionLabel label="1 Contract = 100 Shares" sub="Your real cost when trading options." />

      {/* 100-shares card */}
      <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",
        overflow:"hidden",borderLeft:"4px solid "+OR,marginBottom:"10px"}}>
        <div style={{padding:"18px 20px"}}>
          <p style={{fontSize:"0.87rem",lineHeight:"1.7",color:"#3d2e1e",marginBottom:"16px"}}>
            When you see a contract priced at <strong>$1.30</strong>, that is the price <em>per share</em>. Because every contract covers 100 shares, your actual cost to enter the trade is <strong>$1.30 × 100 = $130</strong>. That $130 is your <strong>premium</strong> — the total amount you pay to enter the trade.
          </p>
          <div style={{background:"linear-gradient(130deg,#1a1108,#2c1d0e)",borderRadius:"10px",
            padding:"16px 20px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px",marginBottom:"14px"}}>
            {[
              {label:"Contract Price", val:"$1.30", sub:"100 shares per contract"},
              {label:"× Shares",       val:"× 100", sub:"Always exactly 100"},
              {label:"Premium",        val:"$130",  sub:"What you pay to enter"},
            ].map((item,i)=>(
              <div key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:"0.6rem",fontWeight:"700",letterSpacing:"0.12em",
                  textTransform:"uppercase",color:"#9a7a55",marginBottom:"4px"}}>{item.label}</div>
                <div style={{fontFamily:"Georgia,serif",fontSize:"1.4rem",fontWeight:"700",
                  color:i===2?GR:"#fff",marginBottom:"2px"}}>{item.val}</div>
                <div style={{fontSize:"0.68rem",color:"#6a5540"}}>{item.sub}</div>
              </div>
            ))}
          </div>
          <RuleBox rule="Always multiply the price you see on the chain by 100. That number — not the per-share price — is what you are committing. It is also the most you can lose if the contract expires worthless." />
        </div>
      </div>

      <SectionLabel label="Buying vs. Selling — Which Price Applies to You" sub="Every contract shows two prices side by side. Here's which one is yours." />

      {/* Bid/Ask cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
        <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",
          overflow:"hidden",borderTop:"4px solid "+OR}}>
          <div style={{padding:"16px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"1.2rem"}}>📤</span>
              <div>
                <div style={{fontWeight:"700",fontSize:"0.9rem",color:DK}}>Buying a contract</div>
                <div style={{fontSize:"0.72rem",color:"#8a7560"}}>Call or Put — doesn't matter</div>
              </div>
            </div>
            <p style={{fontSize:"0.82rem",lineHeight:"1.65",color:"#3d2e1e",marginBottom:"12px"}}>
              When you buy any contract, you pay the <strong>Ask</strong> — the price sellers are asking for. It is always the higher of the two quoted prices.
            </p>
            <div style={{background:"#fff4eb",borderRadius:"8px",padding:"10px 12px"}}>
              <div style={{fontSize:"0.68rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:OR,marginBottom:"4px"}}>You pay</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:"1.5rem",fontWeight:"700",color:OR}}>The Ask</div>
              <div style={{fontSize:"0.72rem",color:"#a05020",marginTop:"2px"}}>Ask × 100 = your total cost</div>
            </div>
          </div>
        </div>
        <div style={{background:CA,border:"1px solid "+BD,borderRadius:"12px",
          overflow:"hidden",borderTop:"4px solid "+BL}}>
          <div style={{padding:"16px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"1.2rem"}}>📥</span>
              <div>
                <div style={{fontWeight:"700",fontSize:"0.9rem",color:DK}}>Selling a contract</div>
                <div style={{fontSize:"0.72rem",color:"#8a7560"}}>Exiting a trade you already hold</div>
              </div>
            </div>
            <p style={{fontSize:"0.82rem",lineHeight:"1.65",color:"#3d2e1e",marginBottom:"12px"}}>
              When you sell a contract to exit your trade, you receive the <strong>Bid</strong> — what buyers are currently willing to pay. It is always the lower of the two prices.
            </p>
            <div style={{background:"#edf4ff",borderRadius:"8px",padding:"10px 12px"}}>
              <div style={{fontSize:"0.68rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:BL,marginBottom:"4px"}}>You receive</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:"1.5rem",fontWeight:"700",color:BL}}>The Bid</div>
              <div style={{fontSize:"0.72rem",color:"#2a5aa0",marginTop:"2px"}}>Bid × 100 = what you receive</div>
            </div>
          </div>
        </div>
      </div>

      {/* Summary dark bar */}
      <div style={{background:"linear-gradient(130deg,#1a1108,#2c1d0e)",borderRadius:"12px",
        padding:"18px 20px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.15em",
          textTransform:"uppercase",color:"#9a7a55",marginBottom:"14px"}}>📋 The Three Things to Remember</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"14px"}}>
          {[
            {num:"1", label:"Contracts cover", val:"100 shares",  sub:"Every single one",        color:OR},
            {num:"2", label:"Buying? You pay", val:"The Ask",     sub:"Always the higher price",  color:GR},
            {num:"3", label:"Selling? You get",val:"The Bid",     sub:"Always the lower price",   color:BL},
          ].map(item=>(
            <div key={item.num} style={{textAlign:"center"}}>
              <div style={{width:"22px",height:"22px",borderRadius:"50%",background:item.color,
                color:"#fff",fontWeight:"700",fontSize:"0.72rem",display:"flex",
                alignItems:"center",justifyContent:"center",margin:"0 auto 8px"}}>{item.num}</div>
              <div style={{fontSize:"0.62rem",fontWeight:"700",letterSpacing:"0.1em",
                textTransform:"uppercase",color:"#9a7a55",marginBottom:"4px"}}>{item.label}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:"1.05rem",fontWeight:"700",
                color:item.color,marginBottom:"2px"}}>{item.val}</div>
              <div style={{fontSize:"0.65rem",color:"#6a5540"}}>{item.sub}</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

// ── App ───────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState(0);

  const TABS = [
    {icon:"📖", label:"What Is an Option"},
    {icon:"📦", label:"Contracts & Cost"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#F5F0E8"}}>

      {/* Topbar */}
      <div style={{background:DK,padding:"11px 20px",display:"flex",
        justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontFamily:"Georgia,serif",fontStyle:"italic",
          fontSize:"1.2rem",color:"#fff"}}>demystified</span>
        <a href="https://options101-hub.vercel.app/"
          style={{display:"flex",alignItems:"center",gap:"6px",
            background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.14)",
            borderRadius:"999px",padding:"5px 14px",textDecoration:"none"}}
          onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}>
          <span style={{color:"#d4a87a",fontSize:"0.8rem"}}>←</span>
          <span style={{fontSize:"0.65rem",fontWeight:"700",letterSpacing:"0.1em",
            textTransform:"uppercase",color:"#d4a87a"}}>Options 101 Hub</span>
        </a>
        <div style={{width:"22px",height:"22px",background:OR,borderRadius:"5px"}}/>
      </div>

      {/* Max-width wrapper */}
      <div style={{maxWidth:"860px",margin:"0 auto",padding:"22px 16px"}}>

        {/* Page header */}
        <div style={{marginBottom:"18px"}}>
          <h1 style={{fontFamily:"Georgia,serif",fontSize:"clamp(1.7rem,4vw,2.3rem)",color:DK,
            letterSpacing:"-0.03em",lineHeight:"1.15",marginBottom:"4px"}}>
            Introduction to Options Trading
          </h1>
          <p style={{color:"#8a7560",fontSize:"0.85rem"}}>
            What options are, how contracts work, and what you pay to enter a trade.
          </p>
        </div>

        {/* Tab navigation */}
        <div style={{display:"flex",gap:"3px",background:"#e4d8c8",borderRadius:"12px",
          padding:"3px",marginBottom:"10px"}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{
              flex:1, padding:"9px 4px", border:"none", borderRadius:"9px", cursor:"pointer",
              fontWeight:"700", fontSize:"0.62rem", letterSpacing:"0.02em",
              transition:"all 0.18s",
              background:tab===i?"#fff":"transparent",
              color:tab===i?OR:"#8a7560",
              boxShadow:tab===i?"0 1px 6px rgba(0,0,0,0.09)":"none",
              lineHeight:"1.3"
            }}>
              <div>{t.icon}</div>
              <div style={{marginTop:"2px"}}>{t.label}</div>
            </button>
          ))}
        </div>

        {/* Progress bar */}
        <div style={{height:"3px",background:"#e4d8c8",borderRadius:"2px",marginBottom:"20px"}}>
          <div style={{height:"100%",width:`${(tab/(TABS.length-1))*100}%`,
            background:OR,borderRadius:"2px",transition:"width 0.4s ease"}}/>
        </div>

        {tab===0 && <Tab1 onNext={()=>setTab(1)} />}
        {tab===1 && <Tab2 />}

        {/* Footer */}
        <div style={{marginTop:"24px",textAlign:"center",fontSize:"0.65rem",
          color:"#b0a090",letterSpacing:"0.05em"}}>
          <span style={{fontFamily:"Georgia,serif",fontStyle:"italic"}}>demystified</span>
          {" "}· For educational purposes only
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
